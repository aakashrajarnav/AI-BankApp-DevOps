# Dependency vulnerability scanning
# OWASP Dependency-Check for Maven

name: Dependency Scan

on:
  push:
    branches: [start]

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Correct cache location
      - name: Cache NVD Database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check
          key: nvd-db-${{ runner.os }}
          restore-keys: nvd-db-

      # Step 1: Download vulnerability DB
      - name: Update NVD Database
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:update-only \
          -DnvdApiKey=$NVD_API_KEY \
          -DnvdApiDelay=8000 \
          -DnvdMaxRetryCount=20 \
          -DdataDirectory=$HOME/.dependency-check

      # Step 2: Scan dependencies
      - name: Scan Dependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -DautoUpdate=false \
          -DnvdApiKey=$NVD_API_KEY \
          -DdataDirectory=$HOME/.dependency-check \
          -DfailBuildOnCVSS=7

      - name: Upload Dependency Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html