kind: Service
apiVersion: v1
metadata:
  name: mysql-service
  namespace: bankapp
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
---
kind: Service
apiVersion: v1
metadata:
  name: bankapp-service
  namespace: bankapp
spec:
  selector:
    app: bankapp
  ports:
    - port: 8080
      targetPort: 8080

  type: NodePort

---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: bankapp
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
  type: ClusterIP
