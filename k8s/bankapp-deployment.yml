kind: Deployment
apiVersion: apps/v1
metadata:
  name: bankapp-deployment
  namespace: bankapp
  labels:
    app: bankapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      containers:
        - name: bankapp
          image: trainwithshubham/ai-bankapp:k8s
          ports:
          - containerPort: 8080
          envFrom:
            - configMapRef: #it will import entire configmap variables here
                name: bankapp-config-map

            - secretRef:  #it will import entire secrets variables here
                name: bankapp-secrets
